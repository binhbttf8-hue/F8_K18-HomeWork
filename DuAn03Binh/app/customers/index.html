<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Khách Hàng | ShopAdmin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root{--primary-color:#3498db;--dark-color:#2c3e50;--bg-color:#f4f7f6;--gold:#f1c40f;--silver:#95a5a6;--bronze:#d35400;--success:#27ae60}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}body{background:var(--bg-color)}
    .container{display:flex;min-height:100vh}
    .sidebar{width:260px;background:var(--dark-color);color:#fff;padding:25px;position:sticky;top:0;height:100vh}
    .sidebar h2{margin-bottom:40px;text-align:center;color:var(--primary-color)}.sidebar ul{list-style:none}
    .sidebar ul li{padding:15px;cursor:pointer;border-radius:8px;margin-bottom:5px;color:#ecf0f1;transition:.3s}
    .sidebar ul li:hover,.sidebar ul li.active{background:#34495e;color:var(--primary-color)}.sidebar ul li i{margin-right:12px;width:20px}
    .main-content{flex:1;padding:30px}
    header{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:15px 25px;border-radius:12px;margin-bottom:30px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .search-bar input{padding:10px 20px;width:350px;border:1px solid #ddd;border-radius:25px;outline:none}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px}
    .card{background:#fff;padding:25px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.05);transition:transform .2s}
    .card:hover{transform:translateY(-2px)}.card h3{font-size:.85rem;color:#7f8c8d;text-transform:uppercase;margin-bottom:10px}
    .card p{font-size:1.8rem;font-weight:700;color:var(--dark-color)}
    .table-container{background:#fff;padding:25px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.05);overflow-x:auto}
    .table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    table{width:100%;border-collapse:collapse;min-width:600px}
    th{text-align:left;padding:15px;background:#f8f9fa;color:#666;font-size:.9rem}
    td{padding:15px;border-bottom:1px solid #eee;font-size:.95rem}
    tbody tr{transition:background .2s}tbody tr:hover{background:#f8f9fa}
    .cust-info{display:flex;align-items:center;gap:12px}
    .avatar{width:40px;height:40px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-weight:700;color:#7f8c8d;font-size:.85rem}
    .tier{padding:4px 10px;border-radius:4px;font-size:.75rem;font-weight:700;color:#fff}
    .tier.GOLD{background:var(--gold)}.tier.SILVER{background:var(--silver)}.tier.BRONZE{background:var(--bronze)}
    .btn-add{background:var(--primary-color);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}
    .btn-action{border:none;background:#f0f2f5;padding:8px;border-radius:6px;cursor:pointer;color:#555;margin:0 2px}.btn-action:hover{background:#e0e0e0}
    small{color:#7f8c8d}
    .menu-btn{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--dark-color)}
    .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999}.overlay.active{display:block}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000}
    .modal-content{background:#fff;padding:25px;border-radius:12px;width:400px;max-width:90%}
    .modal-content h3{margin-bottom:20px}.form-group{margin-bottom:15px}
    .form-group label{display:block;margin-bottom:5px;font-weight:600;font-size:.9rem}
    .form-group input,.form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;outline:none}
    .modal-buttons{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
    .btn-cancel{background:#eee;color:#7f8c8d;border:none;padding:10px 20px;border-radius:8px;cursor:pointer}
    .btn-save{background:var(--success);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}
    @media(max-width:992px){.sidebar{position:fixed;left:-280px;z-index:1000;height:100vh}.sidebar.active{left:0}.search-bar input{width:200px}.menu-btn{display:block}}
    @media(max-width:768px){.stats{grid-template-columns:1fr}header{flex-wrap:wrap;gap:10px}.search-bar input{width:100%}.search-bar{flex:1}}
  </style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="container">
  <aside class="sidebar" id="sidebar">
    <h2>ShopAdmin</h2>
    <ul>
      <li onclick="location.href='../index.html'"><i class="fas fa-home"></i> Tổng quan</li>
      <li onclick="location.href='../products/index.html'"><i class="fas fa-box"></i> Sản phẩm</li>
      <li onclick="location.href='../orders/index.html'"><i class="fas fa-shopping-cart"></i> Đơn hàng</li>
      <li class="active"><i class="fas fa-users"></i> Khách hàng</li>
      <li onclick="location.href='../categories/index.html'"><i class="fas fa-tags"></i> Danh mục</li>
      <li onclick="location.href='../reports/index.html'"><i class="fas fa-chart-line"></i> Báo cáo</li>
    </ul>
  </aside>


  <main class="main-content">
    <header>
      <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
      <div class="search-bar">
        <input type="text" id="searchInput" onkeyup="filterCustomers()" placeholder="Tìm tên, email hoặc SĐT...">
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn-add" onclick="openModal()"><i class="fas fa-user-plus"></i> Thêm khách hàng</button>
        <button onclick="toggleDarkMode()" style="background:none;border:1px solid #ddd;padding:8px 12px;border-radius:8px;cursor:pointer;color:#7f8c8d" title="Chế độ tối"><i class="fas fa-moon"></i></button>
        <button style="background:none;border:1px solid #ddd;padding:8px 12px;border-radius:8px;cursor:pointer;color:#7f8c8d" onclick="logout()" title="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>

    <section class="stats">
      <div class="card"><h3>Tổng khách hàng</h3><p id="statTotal">0</p></div>
      <div class="card"><h3>Hạng Vàng</h3><p id="statGold" style="color:#f1c40f">0</p></div>
      <div class="card"><h3>Tổng chi tiêu</h3><p id="statSpent">0đ</p></div>
    </section>

    <section class="table-container">
      <div class="table-header">
        <h3>Danh sách khách hàng</h3>
        <select id="rankFilter" onchange="filterCustomers()" style="padding:8px;border-radius:5px;border:1px solid #ddd">
          <option value="">Hạng: Tất cả</option>
          <option value="GOLD">Hạng: Vàng</option>
          <option value="SILVER">Hạng: Bạc</option>
          <option value="BRONZE">Hạng: Đồng</option>
        </select>
      </div>
      <table>
        <thead><tr><th>Khách hàng</th><th>Liên hệ</th><th>Hạng</th><th>Tổng chi tiêu</th><th>Thao tác</th></tr></thead>
        <tbody id="customerTableBody"><tr><td colspan="5" style="text-align:center;padding:30px;color:#999">Đang tải...</td></tr></tbody>
      </table>
      <div id="pagination"></div>
    </section>
  </main>
</div>

<!-- Modal thêm/sửa -->
<div id="customerModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Thêm khách hàng mới</h3>
    <div class="form-group"><label>Họ tên *</label><input type="text" id="custName" placeholder="Nguyễn Văn A" required></div>
    <div class="form-group"><label>Email *</label><input type="email" id="custEmail" placeholder="email@example.com" required></div>
    <div class="form-group"><label>Số điện thoại</label><input type="text" id="custPhone" placeholder="0912.345.678"></div>
    <div class="form-group"><label>Địa chỉ</label><input type="text" id="custAddress" placeholder="Hà Nội"></div>
    <div class="form-group">
      <label>Hạng thành viên</label>
      <select id="custRank"><option value="BRONZE">Đồng</option><option value="SILVER">Bạc</option><option value="GOLD">Vàng</option></select>
    </div>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Hủy</button>
      <button class="btn-save" id="btnSaveCust" onclick="saveCustomer()">Lưu</button>
    </div>
  </div>
</div>

<script src="../api.js"></script>
<script>
  requireAuth();

  const rankLabels = { GOLD:'VÀNG', SILVER:'BẠC', BRONZE:'ĐỒNG' };
  const rankColors = { GOLD:{bg:'#fef9e7',text:'#f39c12'}, SILVER:{bg:'#f2f3f4',text:'#7f8c8d'}, BRONZE:{bg:'#fdf2e9',text:'#d35400'} };
  let allCustomers = [];
  let editId = null;
  let custPage = 1;
  const CUST_PER_PAGE = 8;

  function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }
  document.getElementById('overlay').addEventListener('click', toggleMenu);

  function getInitials(name) { return (name||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

  function updateStats() {
    document.getElementById('statTotal').textContent = allCustomers.length;
    document.getElementById('statGold').textContent = allCustomers.filter(c => c.rank === 'GOLD').length;
    const totalSpent = allCustomers.reduce((s, c) => s + (Number(c.totalSpending) || 0), 0);
    document.getElementById('statSpent').textContent = formatMoney(totalSpent);
  }

  function renderCustomers(customers) {
    const tbody = document.getElementById('customerTableBody');
    const pgEl = document.getElementById('pagination');
    if (!customers.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#999">Không tìm thấy khách hàng nào</td></tr>';
      pgEl.innerHTML = '';
      return;
    }
    const { data, page, totalPages, total } = paginate(customers, custPage, CUST_PER_PAGE);
    tbody.innerHTML = data.map(c => {
      const initials = getInitials(c.name);
      const color = rankColors[c.rank] || rankColors.BRONZE;
      return `
        <tr>
          <td><div class="cust-info"><div class="avatar" style="background:${color.bg};color:${color.text}">${initials}</div><div><strong>${c.name}</strong><br><small>ID: ${c.id}</small></div></div></td>
          <td>${c.email || ''}<br><small>${c.phone || ''}</small></td>
          <td><span class="tier ${c.rank}">${rankLabels[c.rank] || c.rank}</span></td>
          <td><strong>${formatMoney(Number(c.totalSpending) || 0)}</strong></td>
          <td>
            <button class="btn-action" onclick="editCustomer(${c.id})" title="Sửa"><i class="fas fa-user-edit"></i></button>
            <button class="btn-action" onclick="removeCustomer(${c.id}, '${(c.name||'').replace(/'/g,"\\'")}')" title="Xóa"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`;
    }).join('');

    // Pagination
    if (totalPages <= 1) { pgEl.innerHTML = ''; return; }
    let pgH = '<div style="display:flex;justify-content:center;align-items:center;gap:5px;margin-top:15px">';
    pgH += `<button onclick="goCustPage(${page-1})" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff" ${page===1?'disabled style="opacity:.4;padding:6px 12px;border:1px solid #ddd;border-radius:6px"':''}>&laquo;</button>`;
    for(let i=1;i<=totalPages;i++){if(i===1||i===totalPages||(i>=page-1&&i<=page+1)){pgH+=`<button onclick="goCustPage(${i})" style="padding:6px 12px;border:1px solid ${i===page?'#3498db':'#ddd'};border-radius:6px;cursor:pointer;background:${i===page?'#3498db':'#fff'};color:${i===page?'#fff':'#333'};font-weight:${i===page?'700':'400'}">${i}</button>`}else if(i===page-2||i===page+2){pgH+='<span style="padding:0 5px;color:#999">...</span>';}}
    pgH += `<button onclick="goCustPage(${page+1})" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff" ${page===totalPages?'disabled style="opacity:.4;padding:6px 12px;border:1px solid #ddd;border-radius:6px"':''}>&raquo;</button>`;
    pgH += `<span style="margin-left:10px;color:#7f8c8d;font-size:.85rem">${total} khách hàng</span></div>`;
    pgEl.innerHTML = pgH;
  }

  function goCustPage(p) {
    const filtered = getFilteredCustomers();
    const totalPages = Math.ceil(filtered.length / CUST_PER_PAGE);
    if (p < 1 || p > totalPages) return;
    custPage = p;
    renderCustomers(filtered);
  }

  function getFilteredCustomers() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    const rank = document.getElementById('rankFilter').value;
    let filtered = allCustomers;
    if (rank) filtered = filtered.filter(c => c.rank === rank);
    if (keyword) filtered = filtered.filter(c =>
      (c.name||'').toLowerCase().includes(keyword) ||
      (c.email||'').toLowerCase().includes(keyword) ||
      (c.phone||'').includes(keyword)
    );
    return filtered;
  }

  function filterCustomers() {
    custPage = 1;
    renderCustomers(getFilteredCustomers());
  }

  function openModal() {
    editId = null;
    document.getElementById('modalTitle').textContent = 'Thêm khách hàng mới';
    document.getElementById('custName').value = '';
    document.getElementById('custEmail').value = '';
    document.getElementById('custPhone').value = '';
    document.getElementById('custAddress').value = '';
    document.getElementById('custRank').value = 'BRONZE';
    document.getElementById('customerModal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('customerModal').style.display = 'none'; editId = null; }

  function editCustomer(id) {
    const c = allCustomers.find(x => x.id === id);
    if (!c) return;
    editId = id;
    document.getElementById('modalTitle').textContent = 'Chỉnh sửa khách hàng';
    document.getElementById('custName').value = c.name || '';
    document.getElementById('custEmail').value = c.email || '';
    document.getElementById('custPhone').value = c.phone || '';
    document.getElementById('custAddress').value = c.address || '';
    document.getElementById('custRank').value = c.rank || 'BRONZE';
    document.getElementById('customerModal').style.display = 'flex';
  }

  async function saveCustomer() {
    const data = {
      name: document.getElementById('custName').value.trim(),
      email: document.getElementById('custEmail').value.trim(),
      phone: document.getElementById('custPhone').value.trim(),
      address: document.getElementById('custAddress').value.trim(),
      rank: document.getElementById('custRank').value
    };

    if (!data.name || !data.email) {
      showToast('Vui lòng nhập tên và email!', 'error');
      return;
    }

    const btn = document.getElementById('btnSaveCust');
    btn.disabled = true; btn.textContent = 'Đang lưu...';

    try {
      if (editId) {
        await updateCustomerApi(editId, data);
        showToast('Đã cập nhật khách hàng!', 'success');
      } else {
        await createCustomerApi(data);
        showToast('Đã thêm khách hàng mới!', 'success');
      }
      closeModal();
      allCustomers = await fetchCustomers();
      updateStats(); filterCustomers();
    } catch (err) {
      showToast('Lỗi: ' + err.message, 'error');
    }
    btn.disabled = false; btn.textContent = 'Lưu';
  }

  function removeCustomer(id, name) {
    showConfirm('Bạn có chắc muốn xóa khách hàng "' + name + '"?', async function() {
      try {
        await deleteCustomerApi(id);
        allCustomers = allCustomers.filter(c => c.id !== id);
        updateStats(); filterCustomers();
        showToast('Đã xóa khách hàng!', 'success');
      } catch (err) { showToast('Lỗi: ' + err.message, 'error'); }
    });
  }

  async function loadData() {
    showLoading('Đang tải khách hàng...');
    try {
      allCustomers = await fetchCustomers();
      updateStats(); renderCustomers(allCustomers);
    } catch (err) { showToast('Lỗi tải dữ liệu: ' + err.message, 'error'); }
    hideLoading();
  }
  loadData();
</script>
</body>
</html>
