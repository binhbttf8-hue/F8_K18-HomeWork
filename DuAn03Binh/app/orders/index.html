<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Đơn Hàng | ShopAdmin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root{--primary-color:#3498db;--dark-color:#2c3e50;--bg-color:#f4f7f6;--success:#27ae60;--danger:#e74c3c;--warning:#f39c12;--info:#2980b9}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}body{background:var(--bg-color)}
    .container{display:flex;min-height:100vh}
    .sidebar{width:260px;background:var(--dark-color);color:#fff;padding:25px;position:sticky;top:0;height:100vh}
    .sidebar h2{margin-bottom:40px;text-align:center;color:var(--primary-color)}.sidebar ul{list-style:none}
    .sidebar ul li{padding:15px;cursor:pointer;border-radius:8px;margin-bottom:5px;color:#ecf0f1;transition:.3s}
    .sidebar ul li:hover,.sidebar ul li.active{background:#34495e;color:var(--primary-color)}.sidebar ul li i{margin-right:12px;width:20px}
    .main-content{flex:1;padding:30px}
    header{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:15px 25px;border-radius:12px;margin-bottom:30px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .search-bar input{padding:10px 20px;width:350px;border:1px solid #ddd;border-radius:25px;outline:none}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}
    .card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.05);border-left:5px solid #ccc;transition:transform .2s}
    .card:hover{transform:translateY(-2px)}.card.blue{border-left-color:var(--info)}.card.orange{border-left-color:var(--warning)}
    .card.green{border-left-color:var(--success)}.card.red{border-left-color:var(--danger)}
    .card h3{font-size:.85rem;color:#7f8c8d;text-transform:uppercase;margin-bottom:8px}.card p{font-size:1.6rem;font-weight:700;color:var(--dark-color)}
    .order-controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .tabs{display:flex;gap:10px}.tab{padding:8px 16px;border:none;background:#eee;border-radius:20px;cursor:pointer;font-size:.9rem;transition:.3s}
    .tab.active{background:var(--dark-color);color:#fff}
    .table-container{background:#fff;padding:25px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.05);overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:700px}
    th{text-align:left;padding:15px;background:#f8f9fa;color:#666;font-size:.9rem;border-bottom:2px solid #eee}
    td{padding:15px;border-bottom:1px solid #eee;font-size:.95rem}
    tbody tr{transition:background .2s}tbody tr:hover{background:#f8f9fa}
    .badge{padding:6px 12px;border-radius:20px;font-size:.75rem;font-weight:700;text-transform:uppercase;display:inline-block}
    .badge.pending{background:#fff3e0;color:#e67e22}.badge.delivering{background:#e1f5fe;color:#0288d1}
    .badge.done{background:#e8f5e9;color:#27ae60}.badge.cancel{background:#ffebee;color:#c0392b}
    .btn-action{border:none;background:#f0f2f5;padding:8px;border-radius:6px;cursor:pointer;color:#555;transition:.2s;margin:0 2px}
    .btn-action:hover{background:var(--primary-color);color:#fff}
    .btn-add{background:var(--primary-color);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}
    small{color:#7f8c8d;display:block;margin-top:2px}
    .menu-btn{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--dark-color)}
    .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999}.overlay.active{display:block}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000}
    .modal-content{background:#fff;padding:25px;border-radius:12px;width:500px;max-width:90%;max-height:90vh;overflow-y:auto}
    .modal-content h3{margin-bottom:20px}.modal-content .form-group{margin-bottom:15px}
    .modal-content label{display:block;margin-bottom:5px;font-weight:600;font-size:.9rem}
    .modal-content input,.modal-content select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;outline:none}
    .modal-buttons{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
    .btn-cancel{background:#eee;color:#7f8c8d;border:none;padding:10px 20px;border-radius:8px;cursor:pointer}
    .btn-save{background:var(--success);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}
    .status-select{padding:4px 8px;border:1px solid #ddd;border-radius:15px;font-size:.8rem;cursor:pointer;outline:none}
    .detail-info{margin-bottom:15px}.detail-info p{margin:5px 0;color:#555}.detail-info strong{color:var(--dark-color)}
    @media(max-width:992px){.sidebar{position:fixed;left:-280px;z-index:1000;height:100vh}.sidebar.active{left:0}.search-bar input{width:200px}.menu-btn{display:block}}
    @media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}header{flex-wrap:wrap;gap:10px}.order-controls{flex-direction:column;gap:10px}.tabs{flex-wrap:wrap}}
    @media(max-width:480px){.stats{grid-template-columns:1fr}.main-content{padding:15px}}
  </style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="container">
  <aside class="sidebar" id="sidebar">
    <h2>ShopAdmin</h2>
    <ul>
      <li onclick="location.href='../index.html'"><i class="fas fa-home"></i> Tổng quan</li>
      <li onclick="location.href='../products/index.html'"><i class="fas fa-box"></i> Sản phẩm</li>
      <li class="active"><i class="fas fa-shopping-cart"></i> Đơn hàng</li>
      <li onclick="location.href='../customers/index.html'"><i class="fas fa-users"></i> Khách hàng</li>
      <li onclick="location.href='../categories/index.html'"><i class="fas fa-tags"></i> Danh mục</li>
      <li onclick="location.href='../reports/index.html'"><i class="fas fa-chart-line"></i> Báo cáo</li>
    </ul>
  </aside>

  <main class="main-content">
    <header>
      <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Tìm mã đơn, tên khách hàng..." onkeyup="filterOrders()">
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn-add" onclick="openCreateModal()"><i class="fas fa-plus"></i> Tạo đơn hàng</button>
        <button onclick="toggleDarkMode()" style="background:none;border:1px solid #ddd;padding:8px 12px;border-radius:8px;cursor:pointer;color:#7f8c8d" title="Chế độ tối"><i class="fas fa-moon"></i></button>
        <button style="background:none;border:1px solid #ddd;padding:8px 12px;border-radius:8px;cursor:pointer;color:#7f8c8d" onclick="logout()" title="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>

    <section class="stats">
      <div class="card blue"><h3>Tổng đơn hàng</h3><p id="statTotal">0</p></div>
      <div class="card orange"><h3>Đang xử lý</h3><p id="statProcessing">0</p></div>
      <div class="card green"><h3>Thành công</h3><p id="statCompleted">0</p></div>
      <div class="card red"><h3>Đã hủy</h3><p id="statCancelled">0</p></div>
    </section>

    <section class="table-container">
      <div class="order-controls">
        <div class="tabs">
          <button class="tab active" onclick="setTab('', this)">Tất cả</button>
          <button class="tab" onclick="setTab('pending', this)">Chờ xử lý</button>
          <button class="tab" onclick="setTab('delivering', this)">Đang giao</button>
          <button class="tab" onclick="setTab('done', this)">Đã xong</button>
        </div>
      </div>
      <table>
        <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Sản phẩm</th><th>SL</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
        <tbody id="orderTableBody"><tr><td colspan="6" style="text-align:center;padding:30px;color:#999">Đang tải...</td></tr></tbody>
      </table>
      <div id="pagination"></div>
    </section>
  </main>
</div>

<div id="orderModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Tạo đơn hàng mới</h3>
    <div class="form-group">
      <label>Khách hàng *</label>
      <select id="customerId"><option value="">-- Chọn khách hàng --</option></select>
    </div>
    <div class="form-group">
      <label>Sản phẩm *</label>
      <select id="productId" onchange="updateOrderPreview()"><option value="">-- Chọn sản phẩm --</option></select>
    </div>
    <div class="form-group">
      <label>Số lượng *</label>
      <input type="number" id="amount" min="1" value="1" oninput="updateOrderPreview()">
    </div>
    <div id="orderPreview" style="background:#f8f9fa;border-radius:8px;padding:12px;margin-bottom:10px;display:none">
      <div style="display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:5px"><span>Đơn giá:</span><span id="previewPrice">0đ</span></div>
      <div style="display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:5px"><span>Số lượng:</span><span id="previewQty">0</span></div>
      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.1rem;border-top:2px solid #ddd;padding-top:8px;margin-top:5px;color:#2c3e50"><span>Tổng tiền:</span><span id="previewTotal" style="color:#27ae60">0đ</span></div>
    </div>
    <div class="form-group">
      <label>Trạng thái</label>
      <select id="orderStatus">
        <option value="pending">Chờ xử lý</option>
        <option value="delivering">Đang giao</option>
        <option value="done">Hoàn thành</option>
        <option value="cancel">Đã hủy</option>
      </select>
    </div>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Hủy</button>
      <button class="btn-save" id="btnSaveOrder" onclick="saveOrder()">Lưu đơn hàng</button>
    </div>
  </div>
</div>

<div id="detailModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-file-invoice"></i> Chi tiết đơn hàng</h3>
    <div id="detailContent"></div>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="document.getElementById('detailModal').style.display='none'">Đóng</button>
    </div>
  </div>
</div>

<script src="../api.js"></script>
<script>
  requireAuth();

  const statusLabels = { pending:'Chờ xử lý', delivering:'Đang giao', done:'Hoàn thành', cancel:'Đã hủy' };
  let allOrders = [], allProducts = [], allCustomers = [];
  let currentTab = '';
  let editOrderId = null;
  let orderPage = 1;
  const ORDER_PER_PAGE = 8;

  function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }
  document.getElementById('overlay').addEventListener('click', toggleMenu);

  function updateStats() {
    document.getElementById('statTotal').textContent = allOrders.length;
    document.getElementById('statProcessing').textContent = allOrders.filter(o => o.status === 'pending' || o.status === 'delivering').length;
    document.getElementById('statCompleted').textContent = allOrders.filter(o => o.status === 'done').length;
    document.getElementById('statCancelled').textContent = allOrders.filter(o => o.status === 'cancel').length;
  }

  function renderOrders(orders) {
    const tbody = document.getElementById('orderTableBody');
    const pgEl = document.getElementById('pagination');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#999">Không tìm thấy đơn hàng nào</td></tr>';
      pgEl.innerHTML = '';
      return;
    }
    const { data, page, totalPages, total } = paginate(orders, orderPage, ORDER_PER_PAGE);
    tbody.innerHTML = data.map(o => `
      <tr>
        <td><strong>#${o.id}</strong><br><small>${o.date || ''}</small></td>
        <td>${o.customer?.name || 'N/A'}<br><small>${o.customer?.phone || ''}</small></td>
        <td>${o.product?.name || 'N/A'}</td>
        <td>${o.amount || 0}</td>
        <td>
          <select class="status-select" onchange="changeStatus(${o.id}, this.value)" style="background:${getStatusBg(o.status)};color:${getStatusColor(o.status)}">
            ${Object.keys(statusLabels).map(s => `<option value="${s}" ${s===o.status?'selected':''}>${statusLabels[s]}</option>`).join('')}
          </select>
        </td>
        <td>
          <button class="btn-action" onclick="viewOrder(${o.id})" title="Xem"><i class="fas fa-eye"></i></button>
          <button class="btn-action" onclick="printOrder(${o.id})" title="In hóa đơn"><i class="fas fa-print"></i></button>
          <button class="btn-action" onclick="removeOrder(${o.id})" title="Xóa"><i class="fas fa-trash"></i></button>
        </td>
      </tr>
    `).join('');

    // Pagination
    if (totalPages <= 1) { pgEl.innerHTML = ''; return; }
    let pgH = '<div style="display:flex;justify-content:center;align-items:center;gap:5px;margin-top:15px">';
    pgH += `<button onclick="goOrderPage(${page-1})" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff" ${page===1?'disabled style="opacity:.4;padding:6px 12px;border:1px solid #ddd;border-radius:6px"':''}>&laquo;</button>`;
    for (let i=1;i<=totalPages;i++){if(i===1||i===totalPages||(i>=page-1&&i<=page+1)){pgH+=`<button onclick="goOrderPage(${i})" style="padding:6px 12px;border:1px solid ${i===page?'#3498db':'#ddd'};border-radius:6px;cursor:pointer;background:${i===page?'#3498db':'#fff'};color:${i===page?'#fff':'#333'};font-weight:${i===page?'700':'400'}">${i}</button>`}else if(i===page-2||i===page+2){pgH+='<span style="padding:0 5px;color:#999">...</span>';}}
    pgH += `<button onclick="goOrderPage(${page+1})" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff" ${page===totalPages?'disabled style="opacity:.4;padding:6px 12px;border:1px solid #ddd;border-radius:6px"':''}>&raquo;</button>`;
    pgH += `<span style="margin-left:10px;color:#7f8c8d;font-size:.85rem">${total} đơn hàng</span></div>`;
    pgEl.innerHTML = pgH;
  }

  function goOrderPage(p) {
    const filtered = getFilteredOrders();
    const totalPages = Math.ceil(filtered.length / ORDER_PER_PAGE);
    if (p < 1 || p > totalPages) return;
    orderPage = p;
    renderOrders(filtered);
  }

  function getFilteredOrders() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allOrders;
    if (currentTab) filtered = filtered.filter(o => o.status === currentTab);
    if (keyword) filtered = filtered.filter(o =>
      String(o.id).includes(keyword) || (o.customer?.name || '').toLowerCase().includes(keyword)
    );
    return filtered.slice().reverse();
  }

  function getStatusBg(s) { return {pending:'#fff3e0',delivering:'#e1f5fe',done:'#e8f5e9',cancel:'#ffebee'}[s]||'#f0f2f5'; }
  function getStatusColor(s) { return {pending:'#e67e22',delivering:'#0288d1',done:'#27ae60',cancel:'#c0392b'}[s]||'#555'; }

  function filterOrders() {
    orderPage = 1;
    renderOrders(getFilteredOrders());
  }

  function setTab(status, btn) {
    currentTab = status;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    filterOrders();
  }

  async function changeStatus(id, newStatus) {
    try {
      const order = allOrders.find(o => o.id === id);
      await updateOrderApi(id, { productId: order.product?.id, customerId: order.customer?.id, amount: order.amount, status: newStatus });
      order.status = newStatus;
      updateStats();
      filterOrders();
      showToast('Đã cập nhật trạng thái!', 'info');
    } catch (err) { showToast('Lỗi: ' + err.message, 'error'); }
  }

  function removeOrder(id) {
    showConfirm('Bạn có chắc muốn xóa đơn hàng #' + id + '?', async function() {
      try {
        await deleteOrderApi(id);
        allOrders = allOrders.filter(o => o.id !== id);
        updateStats(); filterOrders();
        showToast('Đã xóa đơn hàng!', 'success');
      } catch (err) { showToast('Lỗi: ' + err.message, 'error'); }
    });
  }

  function printOrder(id) {
    const o = allOrders.find(x => x.id === id);
    if (o) printInvoice(o);
  }

  function viewOrder(id) {
    const o = allOrders.find(x => x.id === id);
    if (!o) return;
    document.getElementById('detailContent').innerHTML = `
      <div class="detail-info">
        <p><strong>Mã đơn:</strong> #${o.id}</p>
        <p><strong>Ngày tạo:</strong> ${o.date || 'N/A'}</p>
        <p><strong>Khách hàng:</strong> ${o.customer?.name || 'N/A'} - ${o.customer?.phone || ''}</p>
        <p><strong>Sản phẩm:</strong> ${o.product?.name || 'N/A'}</p>
        <p><strong>Giá:</strong> ${formatMoney(o.product?.price || 0)}</p>
        <p><strong>Số lượng:</strong> ${o.amount || 0}</p>
        <p><strong>Tổng tiền:</strong> <b>${formatMoney((o.product?.price || 0) * (o.amount || 1))}</b></p>
        <p><strong>Trạng thái:</strong> <span class="badge ${o.status}">${statusLabels[o.status]}</span></p>
      </div>
    `;
    document.getElementById('detailModal').style.display = 'flex';
  }

  // Modal tạo đơn
  function openCreateModal() {
    editOrderId = null;
    document.getElementById('modalTitle').textContent = 'Tạo đơn hàng mới';
    document.getElementById('customerId').innerHTML = '<option value="">-- Chọn khách hàng --</option>' +
      allCustomers.map(c => `<option value="${c.id}">${c.name} - ${c.phone || c.email}</option>`).join('');
    document.getElementById('productId').innerHTML = '<option value="">-- Chọn sản phẩm --</option>' +
      allProducts.map(p => `<option value="${p.id}">${p.name} - ${formatMoney(p.price||0)}</option>`).join('');
    document.getElementById('amount').value = 1;
    document.getElementById('orderStatus').value = 'pending';
    document.getElementById('orderModal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

  function updateOrderPreview() {
    const productId = Number(document.getElementById('productId').value);
    const amount = Number(document.getElementById('amount').value) || 0;
    const preview = document.getElementById('orderPreview');
    const product = allProducts.find(p => p.id === productId);

    if (product && amount > 0) {
      preview.style.display = 'block';
      document.getElementById('previewPrice').textContent = formatMoney(product.price || 0);
      document.getElementById('previewQty').textContent = amount;
      document.getElementById('previewTotal').textContent = formatMoney((product.price || 0) * amount);
    } else {
      preview.style.display = 'none';
    }
  }

  async function saveOrder() {
    const customerId = Number(document.getElementById('customerId').value);
    const productId = Number(document.getElementById('productId').value);
    const amount = Number(document.getElementById('amount').value) || 1;
    const status = document.getElementById('orderStatus').value;

    if (!customerId || !productId) {
      showToast('Vui lòng chọn khách hàng và sản phẩm!', 'error');
      return;
    }

    const btn = document.getElementById('btnSaveOrder');
    btn.disabled = true; btn.textContent = 'Đang lưu...';

    try {
      await createOrderApi({ customerId, productId, amount, status });
      closeModal();
      allOrders = await fetchOrders();
      updateStats(); filterOrders();
      showToast('Đã tạo đơn hàng mới!', 'success');
    } catch (err) {
      showToast('Lỗi: ' + err.message, 'error');
    }
    btn.disabled = false; btn.textContent = 'Lưu đơn hàng';
  }

  // Init
  async function loadData() {
    showLoading('Đang tải đơn hàng...');
    try {
      [allOrders, allProducts, allCustomers] = await Promise.all([fetchOrders(), fetchProducts(), fetchCustomers()]);
      updateStats();
      renderOrders(allOrders.slice().reverse());
    } catch (err) { showToast('Lỗi tải dữ liệu: ' + err.message, 'error'); }
    hideLoading();
  }
  loadData();
</script>
</body>
</html>
