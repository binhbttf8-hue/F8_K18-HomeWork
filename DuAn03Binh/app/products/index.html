<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Sản Phẩm | ShopAdmin</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="container">
  <aside class="sidebar" id="sidebar">
    <h2>ShopAdmin</h2>
    <ul>
      <li onclick="location.href='../index.html'"><i class="fas fa-home"></i> Tổng quan</li>
      <li class="active"><i class="fas fa-box"></i> Sản phẩm</li>
      <li onclick="location.href='../orders/index.html'"><i class="fas fa-shopping-cart"></i> Đơn hàng</li>
      <li onclick="location.href='../customers/index.html'"><i class="fas fa-users"></i> Khách hàng</li>
      <li onclick="location.href='../categories/index.html'"><i class="fas fa-tags"></i> Danh mục</li>
      <li onclick="location.href='../reports/index.html'"><i class="fas fa-chart-line"></i> Báo cáo</li>
    </ul>
  </aside>

  <main class="main-content">
    <header>
      <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Tìm tên sản phẩm, mã SKU..." onkeyup="filterProducts()">
      </div>
      <div class="user-actions" style="display:flex;gap:10px;align-items:center">
        <a href="create.html" class="btn-add"><i class="fas fa-plus"></i> Thêm sản phẩm</a>
        <button onclick="toggleDarkMode()" style="background:none;border:1px solid #ddd;padding:8px 12px;border-radius:8px;cursor:pointer;color:#7f8c8d" title="Chế độ tối"><i class="fas fa-moon"></i></button>
        <button style="background:none;border:1px solid #ddd;padding:8px 12px;border-radius:8px;cursor:pointer;color:#7f8c8d" onclick="logout()" title="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>

    <section class="stats">
      <div class="card"><h3>Tổng sản phẩm</h3><p id="statTotal">0</p></div>
      <div class="card"><h3>Sắp hết hàng</h3><p id="statLowStock" style="color:#e74c3c;">0</p></div>
      <div class="card"><h3>Danh mục</h3><p id="statCategories">0</p></div>
    </section>

    <section class="table-container">
      <div class="table-header">
        <h3>Danh sách sản phẩm</h3>
        <div class="filters">
          <select id="categoryFilter" onchange="filterProducts()">
            <option value="">Tất cả danh mục</option>
          </select>
        </div>
      </div>
      <table>
        <thead>
        <tr>
          <th>Hình</th>
          <th style="cursor:pointer" onclick="sortBy('name')">Tên SP <i class="fas fa-sort" id="sort-name"></i></th>
          <th>Danh mục</th>
          <th style="cursor:pointer" onclick="sortBy('price')">Giá bán <i class="fas fa-sort" id="sort-price"></i></th>
          <th style="cursor:pointer" onclick="sortBy('remaining')">Tồn kho <i class="fas fa-sort" id="sort-remaining"></i></th>
          <th>Thao tác</th>
        </tr>
        </thead>
        <tbody id="productTableBody">
          <tr><td colspan="6" style="text-align:center;padding:30px;color:#999;">Đang tải...</td></tr>
        </tbody>
      </table>
      <div id="pagination"></div>
    </section>
  </main>
</div>

<script src="../api.js"></script>
<script>
  requireAuth();

  let allProducts = [];
  let allCategories = [];
  let currentPage = 1;
  const PER_PAGE = 8;
  let sortField = '';
  let sortAsc = true;

  function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }
  document.getElementById('overlay').addEventListener('click', toggleMenu);

  function renderProducts(products) {
    const tbody = document.getElementById('productTableBody');
    if (products.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#999;">Không tìm thấy sản phẩm nào</td></tr>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    const { data, page, totalPages, total } = paginate(products, currentPage, PER_PAGE);

    tbody.innerHTML = data.map(p => `
      <tr>
        <td>${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}" class="img-thumb">` : '<div class="img-thumb" style="width:50px;height:50px;background:#eee;border-radius:8px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-image" style="color:#ccc"></i></div>'}</td>
        <td><strong>${p.name}</strong><br><small>SKU: ${p.sku || 'N/A'}</small></td>
        <td>${p.category?.name || 'N/A'}</td>
        <td>${formatMoney(p.price || 0)}</td>
        <td class="${(p.remaining || 0) <= 5 ? 'stock-low' : ''}">${p.remaining || 0}${(p.remaining || 0) <= 5 ? ' (Cảnh báo)' : ''}</td>
        <td>
          <button class="btn-icon edit" onclick="location.href='create.html?id=${p.id}'" title="Sửa"><i class="fas fa-edit"></i></button>
          <button class="btn-icon delete" onclick="removeProduct(${p.id}, '${p.name.replace(/'/g, "\\'")}')" title="Xóa"><i class="fas fa-trash"></i></button>
        </td>
      </tr>
    `).join('');

    // Pagination
    const pgEl = document.getElementById('pagination');
    if (totalPages <= 1) { pgEl.innerHTML = ''; return; }
    let pgHtml = '<div style="display:flex;justify-content:center;align-items:center;gap:5px;margin-top:15px">';
    pgHtml += `<button onclick="goPage(${page-1})" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff" ${page===1?'disabled style="opacity:.4;padding:6px 12px;border:1px solid #ddd;border-radius:6px;cursor:default"':''}>&laquo;</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (i===1||i===totalPages||(i>=page-1&&i<=page+1)) {
        pgHtml += `<button onclick="goPage(${i})" style="padding:6px 12px;border:1px solid ${i===page?'#3498db':'#ddd'};border-radius:6px;cursor:pointer;background:${i===page?'#3498db':'#fff'};color:${i===page?'#fff':'#333'};font-weight:${i===page?'700':'400'}">${i}</button>`;
      } else if (i===page-2||i===page+2) {
        pgHtml += '<span style="padding:0 5px;color:#999">...</span>';
      }
    }
    pgHtml += `<button onclick="goPage(${page+1})" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff" ${page===totalPages?'disabled style="opacity:.4;padding:6px 12px;border:1px solid #ddd;border-radius:6px;cursor:default"':''}>&raquo;</button>`;
    pgHtml += `<span style="margin-left:10px;color:#7f8c8d;font-size:.85rem">${total} sản phẩm</span></div>`;
    pgEl.innerHTML = pgHtml;
  }

  function goPage(p) {
    const totalPages = Math.ceil(getFiltered().length / PER_PAGE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    renderProducts(getFiltered());
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allProducts.length;
    document.getElementById('statLowStock').textContent = allProducts.filter(p => (p.remaining || 0) <= 5).length;
    document.getElementById('statCategories').textContent = allCategories.length;

    const select = document.getElementById('categoryFilter');
    const currentVal = select.value;
    select.innerHTML = '<option value="">Tất cả danh mục</option>' +
      allCategories.map(c => `<option value="${c.id}" ${c.id == currentVal ? 'selected' : ''}>${c.name}</option>`).join('');
  }

  function getFiltered() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    const catId = document.getElementById('categoryFilter').value;
    let filtered = allProducts;

    if (catId) filtered = filtered.filter(p => p.category?.id == catId);
    if (keyword) filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(keyword) || (p.sku || '').toLowerCase().includes(keyword)
    );

    if (sortField) {
      filtered = [...filtered].sort((a, b) => {
        let va = a[sortField] || 0, vb = b[sortField] || 0;
        if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ? 1 : -1;
        return 0;
      });
    }
    return filtered;
  }

  function filterProducts() {
    currentPage = 1;
    renderProducts(getFiltered());
  }

  function sortBy(field) {
    if (sortField === field) { sortAsc = !sortAsc; } else { sortField = field; sortAsc = true; }
    // Update sort icons
    ['name','price','remaining'].forEach(f => {
      const icon = document.getElementById('sort-' + f);
      if (icon) icon.className = f === sortField ? ('fas fa-sort-' + (sortAsc ? 'up' : 'down')) : 'fas fa-sort';
    });
    renderProducts(getFiltered());
  }

  function removeProduct(id, name) {
    showConfirm('Bạn có chắc muốn xóa sản phẩm "' + name + '"?', async function() {
      try {
        await deleteProductApi(id);
        allProducts = allProducts.filter(p => p.id !== id);
        updateStats();
        filterProducts();
        showToast('Đã xóa sản phẩm thành công!', 'success');
      } catch (err) {
        showToast('Lỗi: ' + err.message, 'error');
      }
    });
  }

  async function loadData() {
    showLoading('Đang tải sản phẩm...');
    try {
      [allProducts, allCategories] = await Promise.all([fetchProducts(), getCategories()]);
      updateStats();
      renderProducts(allProducts);
    } catch (err) {
      showToast('Lỗi tải dữ liệu: ' + err.message, 'error');
    }
    hideLoading();
  }

  loadData();
</script>
</body>
</html>
