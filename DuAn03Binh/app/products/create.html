<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thêm sản phẩm | ShopAdmin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
      :root {
          --primary-color: #3498db;
          --dark-color: #2c3e50;
          --bg-color: #f4f7f6;
          --success: #27ae60;
          --border: #dcdde1;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
      body { background-color: var(--bg-color); color: var(--dark-color); }
      .container { display: flex; min-height: 100vh; }

      /* Sidebar */
      .sidebar { width: 260px; background: var(--dark-color); color: white; padding: 25px; position: sticky; top: 0; height: 100vh; }
      .sidebar h2 { margin-bottom: 40px; text-align: center; color: var(--primary-color); }
      .sidebar ul { list-style: none; }
      .sidebar ul li { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; color: #ecf0f1; }
      .sidebar ul li.active { background: #34495e; color: var(--primary-color); }

      /* Main Content */
      .main-content { flex: 1; padding: 40px; }
      .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
      .btn-back { text-decoration: none; color: #7f8c8d; font-weight: 500; }
      .btn-back:hover { color: var(--primary-color); }

      /* Form Layout */
      .product-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
      .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
      .card h3 { margin-bottom: 20px; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }

      /* Input Styles */
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
      .form-group input, .form-group select, .form-group textarea {
          width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; transition: 0.3s;
      }
      .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary-color); }

      /* Image Upload Box */
      .image-upload {
          border: 2px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s;
      }
      .image-upload:hover { border-color: var(--primary-color); background: #f0f7ff; }
      .image-upload i { font-size: 2rem; color: #bdc3c7; margin-bottom: 10px; }
      .preview-img { width: 100%; margin-top: 15px; border-radius: 8px; display: none; }

      /* Footer Actions */
      .form-footer {
          margin-top: 20px; display: flex; justify-content: flex-end; gap: 15px; padding: 20px; background: white; border-radius: 12px;
      }
      .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
      .btn:hover { opacity: 0.9; }
      .btn-save { background: var(--success); color: white; }
      .btn-cancel { background: #eee; color: #7f8c8d; }

      .error-msg { color: #e74c3c; font-size: 0.85rem; margin-top: 5px; display: none; }

      /* Mobile Menu */
      .menu-btn { display: none; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--dark-color); }
      .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
      .overlay.active { display: block; }

      @media (max-width: 992px) {
          .sidebar { position: fixed; left: -280px; z-index: 1000; height: 100vh; transition: 0.3s; }
          .sidebar.active { left: 0; }
          .main-content { padding: 20px; }
          .menu-btn { display: block; }
      }
      @media (max-width: 768px) {
          .product-grid { grid-template-columns: 1fr; }
          .header-actions { flex-direction: column; align-items: flex-start; gap: 10px; }
      }
      @media (max-width: 480px) {
          .main-content { padding: 15px; }
          .form-footer { flex-direction: column; }
          .btn { width: 100%; text-align: center; }
      }
  </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="container">
  <aside class="sidebar" id="sidebar">
    <h2>ShopAdmin</h2>
    <ul>
      <li onclick="location.href='../index.html'"><i class="fas fa-home"></i> Tổng quan</li>
      <li class="active"><i class="fas fa-box"></i> Sản phẩm</li>
      <li onclick="location.href='../orders/index.html'"><i class="fas fa-shopping-cart"></i> Đơn hàng</li>
      <li onclick="location.href='../customers/index.html'"><i class="fas fa-users"></i> Khách hàng</li>
      <li onclick="location.href='../reports/index.html'"><i class="fas fa-chart-line"></i> Báo cáo</li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="header-actions">
      <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
      <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Quay lại danh sách</a>
      <h2 id="pageTitle">Thêm sản phẩm mới</h2>
    </div>

    <form id="productForm" onsubmit="return handleSubmit(event)">
      <div class="product-grid">
        <div class="left-col">
          <div class="card">
            <h3>Thông tin chung</h3>
            <div class="form-group">
              <label>Tên sản phẩm <span style="color:#e74c3c">*</span></label>
              <input type="text" id="name" placeholder="Ví dụ: iPhone 15 Pro Max" required>
            </div>
            <div class="form-group">
              <label>Mô tả sản phẩm</label>
              <textarea id="description" rows="5" placeholder="Nhập đặc điểm nổi bật..."></textarea>
            </div>
          </div>

          <div class="card">
            <h3>Giá cả & Kho hàng</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label>Giá bán (VNĐ) <span style="color:#e74c3c">*</span></label>
                <input type="number" id="price" min="0" placeholder="0" required>
              </div>
              <div class="form-group">
                <label>Giá vốn (VNĐ)</label>
                <input type="number" id="costPrice" min="0" placeholder="0">
              </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label>Mã SKU <span style="color:#e74c3c">*</span></label>
                <input type="text" id="sku" placeholder="VD: IP15P-01" required>
              </div>
              <div class="form-group">
                <label>Số lượng tồn kho <span style="color:#e74c3c">*</span></label>
                <input type="number" id="stock" min="0" placeholder="0" required>
              </div>
            </div>
          </div>
        </div>

        <div class="right-col">
          <div class="card">
            <h3>Hình ảnh sản phẩm</h3>
            <div class="image-upload" onclick="document.getElementById('fileInput').click()">
              <i class="fas fa-cloud-upload-alt"></i>
              <p>Nhấp để tải ảnh lên</p>
              <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(event)">
              <img id="imgPreview" class="preview-img" src="#" alt="Preview">
            </div>
          </div>

          <div class="card">
            <h3>Phân loại</h3>
            <div class="form-group">
              <label>Danh mục</label>
              <select id="category">
                <option value="Điện thoại">Điện thoại</option>
                <option value="Máy tính bảng">Máy tính bảng</option>
                <option value="Phụ kiện">Phụ kiện</option>
              </select>
            </div>
            <div class="form-group">
              <label>Trạng thái</label>
              <select id="status">
                <option value="Đang bán">Đang bán</option>
                <option value="Ngừng kinh doanh">Ngừng kinh doanh</option>
                <option value="Hết hàng">Hết hàng</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button type="button" class="btn btn-cancel" onclick="location.href='index.html'">Hủy bỏ</button>
        <button type="submit" class="btn btn-save" id="btnSave">Lưu sản phẩm</button>
      </div>
    </form>
  </main>
</div>

<script src="../data.js"></script>
<script>
  // Mobile menu
  function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }
  document.getElementById('overlay').addEventListener('click', toggleMenu);

  let editId = null;
  let currentImage = '';

  // Kiểm tra chế độ sửa từ URL param
  const params = new URLSearchParams(location.search);
  if (params.get('id')) {
    editId = params.get('id');
    const product = getProducts().find(p => p.id === editId);
    if (product) {
      document.getElementById('pageTitle').textContent = 'Chỉnh sửa sản phẩm';
      document.title = 'Chỉnh sửa sản phẩm | ShopAdmin';
      document.getElementById('btnSave').textContent = 'Lưu thay đổi';

      // Điền dữ liệu vào form
      document.getElementById('name').value = product.name;
      document.getElementById('description').value = product.description || '';
      document.getElementById('price').value = product.price;
      document.getElementById('costPrice').value = product.costPrice || '';
      document.getElementById('sku').value = product.sku;
      document.getElementById('stock').value = product.stock;
      document.getElementById('category').value = product.category;
      document.getElementById('status').value = product.status;

      // Hiển thị ảnh nếu có
      if (product.image) {
        currentImage = product.image;
        const preview = document.getElementById('imgPreview');
        preview.src = product.image;
        preview.style.display = 'block';
      }
    } else {
      showToast('Không tìm thấy sản phẩm!', 'error');
      location.href = 'index.html';
    }
  }

  function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function() {
      currentImage = reader.result;
      const output = document.getElementById('imgPreview');
      output.src = reader.result;
      output.style.display = 'block';
    }
    reader.readAsDataURL(file);
  }

  function handleSubmit(e) {
    e.preventDefault();

    const productData = {
      name: document.getElementById('name').value.trim(),
      description: document.getElementById('description').value.trim(),
      price: Number(document.getElementById('price').value),
      costPrice: Number(document.getElementById('costPrice').value) || 0,
      sku: document.getElementById('sku').value.trim(),
      stock: Number(document.getElementById('stock').value),
      category: document.getElementById('category').value,
      status: document.getElementById('status').value,
      image: currentImage
    };

    if (!productData.name || !productData.price || !productData.sku || productData.stock < 0) {
      showToast('Vui lòng điền đầy đủ thông tin bắt buộc!', 'error');
      return false;
    }

    if (editId) {
      updateProduct(editId, productData);
    } else {
      addProduct(productData);
    }

    location.href = 'index.html';
    return false;
  }
</script>

</body>
</html>
