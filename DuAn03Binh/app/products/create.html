<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thêm sản phẩm | ShopAdmin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root{--primary-color:#3498db;--dark-color:#2c3e50;--bg-color:#f4f7f6;--success:#27ae60;--border:#dcdde1}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
    body{background:var(--bg-color);color:var(--dark-color)}
    .container{display:flex;min-height:100vh}
    .sidebar{width:260px;background:var(--dark-color);color:#fff;padding:25px;position:sticky;top:0;height:100vh}
    .sidebar h2{margin-bottom:40px;text-align:center;color:var(--primary-color)}
    .sidebar ul{list-style:none}
    .sidebar ul li{padding:15px;cursor:pointer;border-radius:8px;margin-bottom:5px;color:#ecf0f1;transition:.3s}
    .sidebar ul li:hover,.sidebar ul li.active{background:#34495e;color:var(--primary-color)}
    .sidebar ul li i{margin-right:12px;width:20px}
    .main-content{flex:1;padding:40px}
    .header-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
    .btn-back{text-decoration:none;color:#7f8c8d;font-weight:500}.btn-back:hover{color:var(--primary-color)}
    .product-grid{display:grid;grid-template-columns:2fr 1fr;gap:30px}
    .card{background:#fff;padding:25px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.05);margin-bottom:20px}
    .card h3{margin-bottom:20px;font-size:1.1rem;border-bottom:1px solid #eee;padding-bottom:10px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;margin-bottom:8px;font-weight:600;font-size:.9rem}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;outline:none;transition:.3s}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary-color)}
    .image-upload{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:.3s}
    .image-upload:hover{border-color:var(--primary-color);background:#f0f7ff}
    .image-upload i{font-size:2rem;color:#bdc3c7;margin-bottom:10px}
    .preview-img{width:100%;margin-top:15px;border-radius:8px;display:none}
    .form-footer{margin-top:20px;display:flex;justify-content:flex-end;gap:15px;padding:20px;background:#fff;border-radius:12px}
    .btn{padding:12px 25px;border-radius:8px;border:none;font-weight:600;cursor:pointer;transition:.2s}.btn:hover{opacity:.9}
    .btn-save{background:var(--success);color:#fff}.btn-cancel{background:#eee;color:#7f8c8d}
    .menu-btn{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--dark-color)}
    .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999}.overlay.active{display:block}
    .uploading{color:var(--primary-color);font-size:.85rem;margin-top:8px}
    @media(max-width:992px){.sidebar{position:fixed;left:-280px;z-index:1000;height:100vh;transition:.3s}.sidebar.active{left:0}.main-content{padding:20px}.menu-btn{display:block}}
    @media(max-width:768px){.product-grid{grid-template-columns:1fr}.header-actions{flex-direction:column;align-items:flex-start;gap:10px}}
  </style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="container">
  <aside class="sidebar" id="sidebar">
    <h2>ShopAdmin</h2>
    <ul>
      <li onclick="location.href='../index.html'"><i class="fas fa-home"></i> Tổng quan</li>
      <li class="active"><i class="fas fa-box"></i> Sản phẩm</li>
      <li onclick="location.href='../orders/index.html'"><i class="fas fa-shopping-cart"></i> Đơn hàng</li>
      <li onclick="location.href='../customers/index.html'"><i class="fas fa-users"></i> Khách hàng</li>
      <li onclick="location.href='../categories/index.html'"><i class="fas fa-tags"></i> Danh mục</li>
      <li onclick="location.href='../reports/index.html'"><i class="fas fa-chart-line"></i> Báo cáo</li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="header-actions">
      <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
      <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Quay lại danh sách</a>
      <h2 id="pageTitle">Thêm sản phẩm mới</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <button onclick="toggleDarkMode()" style="background:none;border:1px solid #ddd;padding:8px 12px;border-radius:8px;cursor:pointer;color:#7f8c8d" title="Chế độ tối"><i class="fas fa-moon"></i></button>
        <button style="background:none;border:1px solid #ddd;padding:8px 12px;border-radius:8px;cursor:pointer;color:#7f8c8d" onclick="logout()" title="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>

    <form id="productForm" onsubmit="return handleSubmit(event)">
      <div class="product-grid">
        <div class="left-col">
          <div class="card">
            <h3>Thông tin chung</h3>
            <div class="form-group">
              <label>Tên sản phẩm <span style="color:#e74c3c">*</span></label>
              <input type="text" id="name" placeholder="Ví dụ: iPhone 15 Pro Max" required>
            </div>
          </div>
          <div class="card">
            <h3>Giá cả & Kho hàng</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
              <div class="form-group">
                <label>Giá bán (VNĐ)</label>
                <input type="number" id="price" min="0" placeholder="0">
              </div>
              <div class="form-group">
                <label>Mã SKU</label>
                <input type="text" id="sku" placeholder="VD: IP15P-01">
              </div>
            </div>
            <div class="form-group">
              <label>Số lượng tồn kho</label>
              <input type="number" id="remaining" min="0" placeholder="0">
            </div>
          </div>
        </div>
        <div class="right-col">
          <div class="card">
            <h3>Hình ảnh sản phẩm</h3>
            <div class="image-upload" onclick="document.getElementById('fileInput').click()">
              <i class="fas fa-cloud-upload-alt"></i>
              <p>Nhấp để tải ảnh lên</p>
              <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImageUpload(event)">
              <img id="imgPreview" class="preview-img" src="#" alt="Preview">
            </div>
            <p class="uploading" id="uploadStatus" style="display:none"></p>
          </div>
          <div class="card">
            <h3>Phân loại</h3>
            <div class="form-group">
              <label>Danh mục <span style="color:#e74c3c">*</span></label>
              <select id="categoryId" required>
                <option value="">-- Chọn danh mục --</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="form-footer">
        <button type="button" class="btn btn-cancel" onclick="location.href='index.html'">Hủy bỏ</button>
        <button type="submit" class="btn btn-save" id="btnSave">Lưu sản phẩm</button>
      </div>
    </form>
  </main>
</div>


<script src="../api.js"></script>
<script>
  requireAuth();

  let editId = null;
  let uploadedImageId = '';

  function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }
  document.getElementById('overlay').addEventListener('click', toggleMenu);

  async function loadCategories() {
    try {
      const cats = await getCategories();
      const select = document.getElementById('categoryId');
      select.innerHTML = '<option value="">-- Chọn danh mục --</option>' +
        cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    } catch (err) {
      showToast('Lỗi tải danh mục: ' + err.message, 'error');
    }
  }

  // Check edit mode
  async function checkEditMode() {
    const params = new URLSearchParams(location.search);
    if (params.get('id')) {
      editId = Number(params.get('id'));
      try {
        const product = await fetchProductById(editId);
        document.getElementById('pageTitle').textContent = 'Chỉnh sửa sản phẩm';
        document.title = 'Chỉnh sửa sản phẩm | ShopAdmin';
        document.getElementById('btnSave').textContent = 'Lưu thay đổi';

        document.getElementById('name').value = product.name || '';
        document.getElementById('price').value = product.price || '';
        document.getElementById('sku').value = product.sku || '';
        document.getElementById('remaining').value = product.remaining || '';
        if (product.category) document.getElementById('categoryId').value = product.category.id;

        if (product.imageUrl) {
          const preview = document.getElementById('imgPreview');
          preview.src = product.imageUrl;
          preview.style.display = 'block';
        }
      } catch (err) {
        showToast('Không tìm thấy sản phẩm!', 'error');
        setTimeout(() => location.href = 'index.html', 1500);
      }
    }
  }

  // Upload image via API
  async function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const statusEl = document.getElementById('uploadStatus');
    statusEl.style.display = 'block';
    statusEl.textContent = 'Đang tải ảnh lên...';

    // Preview
    const reader = new FileReader();
    reader.onload = function() {
      const preview = document.getElementById('imgPreview');
      preview.src = reader.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);

    try {
      const result = await uploadImage(file);
      uploadedImageId = result.id;
      statusEl.textContent = 'Tải ảnh thành công!';
      statusEl.style.color = '#27ae60';
    } catch (err) {
      statusEl.textContent = 'Lỗi tải ảnh: ' + err.message;
      statusEl.style.color = '#e74c3c';
    }
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.textContent = 'Đang lưu...';

    const data = {
      name: document.getElementById('name').value.trim(),
      categoryId: Number(document.getElementById('categoryId').value),
      price: Number(document.getElementById('price').value) || 0,
      sku: document.getElementById('sku').value.trim(),
      remaining: Number(document.getElementById('remaining').value) || 0
    };

    if (uploadedImageId) data.imageId = uploadedImageId;

    if (!data.name || !data.categoryId) {
      showToast('Vui lòng điền tên và chọn danh mục!', 'error');
      btn.disabled = false;
      btn.textContent = editId ? 'Lưu thay đổi' : 'Lưu sản phẩm';
      return false;
    }

    try {
      if (editId) {
        await updateProductApi(editId, data);
        showToast('Cập nhật sản phẩm thành công!', 'success');
      } else {
        await createProduct(data);
        showToast('Thêm sản phẩm thành công!', 'success');
      }
      setTimeout(() => location.href = 'index.html', 1000);
    } catch (err) {
      showToast('Lỗi: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = editId ? 'Lưu thay đổi' : 'Lưu sản phẩm';
    }
    return false;
  }

  // Init
  loadCategories().then(() => checkEditMode());
</script>
</body>
</html>
